name: Sync main to UAT repo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Add UAT remote
        run: git remote add uat-repo https://x-access-token:${{ secrets.UAT_REPO_TOKEN }}@github.com/KDZFoundation/podrozowka-uat.git

      - name: Force push main -> uat
        run: git push uat-repo HEAD:uat --force

      - name: Summary
        run: echo "Zsynchronizowano main → podrozowka-uat:uat (commit ${{ github.sha }})"
